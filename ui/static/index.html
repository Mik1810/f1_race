<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>F1 DALI Dashboard</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <h1>🏎 F1 Race &middot; DALI Agent Dashboard</h1>
  <span id="led"></span>
  <span id="lbl">connecting&hellip;</span>
  <div class="spacer"></div>
  <button class="hbtn y" onclick="deploySC()">&#9888; Deploy SC</button>
  <button class="hbtn"   onclick="recallSC()">&#10003; Recall SC</button>
  <button class="hbtn r" onclick="restartMas()" title="pkill sicstus + restart via startmas.sh">&#8635; Restart MAS</button>
</header>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-btn-logs"    onclick="switchTab('logs')">📋 Logs</button>
  <button class="tab-btn"        id="tab-btn-circuit" onclick="switchTab('circuit')">🏎 Circuit</button>
</div>

<div id="view-logs">
  <div class="grid" id="grid"></div>
  <div id="minimized-tray"></div>
</div>

<div id="view-circuit" style="display:none">
  <div class="circuit-layout">
    <div class="circuit-track-wrap">
      <canvas id="track-canvas"></canvas>
    </div>
    <div class="circuit-sidebar" id="circuit-sidebar">
      <div class="csb-section">
        <div class="csb-title">Race Status</div>
        <div id="csb-status">Waiting for race&hellip;</div>
      </div>
      <div class="csb-section">
        <div class="csb-title">Standings</div>
        <div id="csb-standings"></div>
      </div>
      <div class="csb-section">
        <div class="csb-title">Live Events</div>
        <div id="csb-events"></div>
      </div>
    </div>
  </div>
</div>

<div class="cmdbar">
  <label>Agent:</label>
  <select id="tgt"></select>
  <label>Command:</label>
  <input id="cmd" type="text" placeholder="send_message(event, sender)."
         onkeydown="if(event.key==='Enter') doSend()">
  <button class="sbtn" onclick="doSend()">Send &#8629;</button>
</div>

<div id="lb-modal" class="lb-hidden">
  <div class="lb-box">
    <div class="lb-header">
      <span>&#127942; Race Results</span>
      <button class="pane-btn" onclick="closeLeaderboard()" title="Close">&#10005;</button>
    </div>
    <div id="lb-body"></div>
  </div>
</div>

<div id="overlay">
  <div class="spinner"></div>
  <div id="overlay-msg">Restarting MAS…</div>
  <div id="overlay-sub">Waiting for LINDA server…</div>
</div>

<script src="/static/app.js"></script>
<script src="/static/circuit.js"></script>
</body>
</html>
